<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atomic Control Center</title>
    <style>
        /* #ENDBLOAT Minimalist Styling */
        body {
            background: #0a0a0a;
            color: #00ff41; /* Terminal Green */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* The Widget Container */
        .widget-box {
            border: 1px solid #00ff41;
            padding: 5px;
            background: #000;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }

        iframe {
            border: none;
            /* Optimized for your AccurateClock dimensions */
            width: 400px; 
            height: 250px;
        }

        .stats {
            margin-top: 15px;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <h1>System Time: Atomic Sync</h1>

    <div class="widget-box">
       
        <iframe 
            src="https://accurateclock.pages.dev" 
            title="AccurateClock Widget"
            loading="eager">
        </iframe>
    </div>

    <div class="stats">
       thiscodemaybebuggy
    </div>

</body>
</html>
